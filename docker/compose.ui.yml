services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    ports:
      - "${KAFKA_UI_PORT}:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_HOSTNAME}:${KAFKA_INTERNAL_PORT}

    depends_on:
      kafka:
        condition: service_healthy

    restart: unless-stopped